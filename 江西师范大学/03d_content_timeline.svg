<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <title>江西师范大学时间轴正文页模板</title>
  <g id="background">
    <rect x="0" y="0" width="1280" height="720" fill="#FFFFFF"/>
    <rect x="0" y="0" width="1280" height="7" fill="#A13838"/>
    <rect x="70" y="164" width="1080" height="430" rx="8" fill="#F7F2F4"/>
  </g>
  <g id="header">
    <rect x="58" y="50" width="8" height="56" fill="#A13838"/>
    <text x="84" y="86" font-family="Microsoft YaHei, Arial" font-size="34" font-weight="700" fill="#262626">{{PAGE_TITLE}}</text>
    <image href="brand_wordmark.png" x="986" y="48" width="198" height="41" preserveAspectRatio="xMidYMid meet"/>
  </g>
  <g id="timeline">
    <line x1="170" y1="362" x2="1056" y2="362" stroke="#A13838" stroke-width="4"/>
    <circle cx="210" cy="362" r="20" fill="#A13838"/>
    <circle cx="424" cy="362" r="20" fill="#E9CAD7" stroke="#A13838" stroke-width="3"/>
    <circle cx="638" cy="362" r="20" fill="#A13838"/>
    <circle cx="852" cy="362" r="20" fill="#E9CAD7" stroke="#A13838" stroke-width="3"/>
    <circle cx="1066" cy="362" r="20" fill="#A13838"/>
    <rect x="152" y="222" width="182" height="82" rx="8" fill="#FFFFFF" stroke="#E9CAD7" stroke-width="1.4"/>
    <rect x="366" y="428" width="182" height="82" rx="8" fill="#FFFFFF" stroke="#E9CAD7" stroke-width="1.4"/>
    <rect x="580" y="222" width="182" height="82" rx="8" fill="#FFFFFF" stroke="#E9CAD7" stroke-width="1.4"/>
    <rect x="794" y="428" width="182" height="82" rx="8" fill="#FFFFFF" stroke="#E9CAD7" stroke-width="1.4"/>
    <rect x="1008" y="222" width="118" height="82" rx="8" fill="#FFFFFF" stroke="#E9CAD7" stroke-width="1.4"/>
    <text x="640" y="578" text-anchor="middle" font-family="Microsoft YaHei Light, Microsoft YaHei, Arial" font-size="25" fill="#7A7A7A">{{CONTENT_AREA}}</text>
  </g>
  <g id="footer">
    <image href="motto.png" x="58" y="650" width="198" height="25" preserveAspectRatio="xMidYMid meet"/>
    <text x="1174" y="674" text-anchor="middle" font-family="Arial, Microsoft YaHei" font-size="17" font-weight="700" fill="#A13838">{{PAGE_NUM}}</text>
  </g>
</svg>
