<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <title>江西师范大学封面模板</title>
  <defs>
    <linearGradient id="coverShade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.62"/>
      <stop offset="0.58" stop-color="#000000" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#A13838" stop-opacity="0.36"/>
    </linearGradient>
  </defs>
  <g id="background">
    <image href="cover_bg_aligned.jpeg" x="0" y="0" width="1280" height="720" preserveAspectRatio="xMidYMid slice"/>
    <rect x="0" y="0" width="1280" height="720" fill="url(#coverShade)"/>
    <rect x="72" y="64" width="1136" height="592" fill="none" stroke="#FFFFFF" stroke-width="1.4" stroke-opacity="0.52"/>
  </g>
  <g id="brand">
    <image href="seal_white.png" x="592" y="88" width="96" height="96" preserveAspectRatio="xMidYMid meet"/>
    <line x1="460" y1="220" x2="590" y2="220" stroke="#FFFFFF" stroke-width="2.4" stroke-opacity="0.86"/>
    <line x1="690" y1="220" x2="820" y2="220" stroke="#FFFFFF" stroke-width="2.4" stroke-opacity="0.86"/>
  </g>
  <g id="title_block">
    <text x="640" y="338" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-size="56" font-weight="700" fill="#FFFFFF">{{TITLE}}</text>
    <text x="640" y="392" text-anchor="middle" font-family="Microsoft YaHei Light, Microsoft YaHei, Arial" font-size="25" fill="#FFFFFF" fill-opacity="0.92">{{SUBTITLE}}</text>
    <rect x="528" y="424" width="224" height="4" fill="#A13838"/>
  </g>
  <g id="meta">
    <text x="640" y="548" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-size="22" fill="#FFFFFF">{{AUTHOR}}</text>
    <text x="640" y="584" text-anchor="middle" font-family="Microsoft YaHei Light, Microsoft YaHei, Arial" font-size="19" fill="#FFFFFF" fill-opacity="0.82">{{DATE}}</text>
  </g>
  <g id="motto">
    <image href="motto_white.png" x="541" y="630" width="198" height="25" preserveAspectRatio="xMidYMid meet"/>
  </g>
</svg>
